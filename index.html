<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>我的記帳</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg:#111111; --card:#1c1c1c; --card2:#242424; --card3:#2a2a2a;
  --border:#2e2e2e; --text:#f5f5f5; --muted:#888888; --muted2:#555555;
  --green:#a8e6cf; --pink:#f4b8c1; --yellow:#f5e6a3; --blue:#b8d4f4;
  --income:#a8e6cf; --expense:#f4b8c1; --invest:#f5e6a3;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; overflow:hidden; -webkit-font-smoothing:antialiased; }
.app { max-width:430px; margin:0 auto; height:100vh; display:flex; flex-direction:column; position:relative; overflow:hidden; }

.page { flex:1; overflow-y:auto; overflow-x:hidden; padding:0 0 88px; display:none; scrollbar-width:none; }
.page::-webkit-scrollbar { display:none; }
.page.active { display:block; }

.header { padding:56px 20px 12px; position:sticky; top:0; z-index:10; background:var(--bg); }
.header-row { display:flex; justify-content:space-between; align-items:center; }
.greeting { font-size:12px; color:var(--muted); font-weight:400; margin-bottom:2px; }
.page-title { font-size:24px; font-weight:700; letter-spacing:-0.03em; }
.avatar-btn { width:40px; height:40px; background:var(--card2); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:18px; border:1px solid var(--border); cursor:pointer; }

/* Loading */
.loading-overlay { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:999; gap:16px; }
.loading-spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--green); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:13px; color:var(--muted); font-weight:500; }
.loading-overlay.hidden { display:none; }

/* Error */
.error-banner { background:rgba(244,184,193,0.1); border:1px solid var(--pink); border-radius:14px; padding:12px 16px; margin:12px 20px 0; font-size:12px; color:var(--pink); display:none; }
.error-banner.show { display:block; }

/* Refresh btn */
.refresh-btn { font-size:16px; cursor:pointer; padding:4px; border-radius:8px; transition:transform 0.3s; }
.refresh-btn.spinning { animation:spin 0.8s linear infinite; }

/* Hero */
.hero-wrap { padding:8px 20px 0; }
.hero-card { background:var(--card2); border-radius:24px; padding:24px; border:1px solid var(--border); position:relative; overflow:hidden; }
.hero-tag { display:inline-flex; align-items:center; gap:6px; background:rgba(168,230,207,0.12); color:var(--green); border-radius:20px; padding:4px 10px; font-size:11px; font-weight:600; margin-bottom:10px; }
.hero-tag-dot { width:5px; height:5px; border-radius:50%; background:var(--green); }
.hero-amount { font-size:40px; font-weight:800; color:var(--text); letter-spacing:-0.04em; margin-bottom:20px; line-height:1; }
.hero-amount span { font-size:24px; font-weight:600; opacity:0.6; margin-right:2px; }
.hero-stats { display:flex; }
.hero-stat { flex:1; }
.hero-stat+.hero-stat { padding-left:16px; border-left:1px solid var(--border); }
.hs-label { font-size:11px; color:var(--muted); margin-bottom:5px; }
.hs-val { font-size:16px; font-weight:700; letter-spacing:-0.02em; }
.hs-val.income { color:var(--green); } .hs-val.expense { color:var(--pink); } .hs-val.invest { color:var(--yellow); }

.section { padding:20px 20px 0; }
.section-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.section-title { font-size:16px; font-weight:700; letter-spacing:-0.02em; }
.chart-card-inner { background:var(--card); border-radius:20px; padding:18px; border:1px solid var(--border); }
.donut-card { background:var(--card); border-radius:20px; padding:20px; border:1px solid var(--border); }

.lc-legend { display:flex; gap:14px; margin-bottom:14px; }
.lc-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); font-weight:500; }
.lc-dot { width:8px; height:8px; border-radius:50%; }
.x-labels { display:flex; justify-content:space-between; padding:8px 0 0; }
.x-lbl { font-size:10px; color:var(--muted2); text-align:center; flex:1; font-weight:500; }

/* Tooltip */
.tip { position:fixed; z-index:999; background:#222; border:1px solid #383838; border-radius:14px; padding:12px 16px; pointer-events:none; opacity:0; transition:opacity 0.15s; box-shadow:0 12px 32px rgba(0,0,0,0.6); min-width:130px; }
.tip.vis { opacity:1; }
.tip-month { font-size:10px; color:var(--muted); margin-bottom:8px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; }
.tip-row { display:flex; align-items:center; gap:7px; margin-bottom:4px; font-size:12px; }
.tip-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.tip-lbl { color:var(--muted); flex:1; }
.tip-val { font-weight:700; font-size:13px; }
.dtip-name { font-size:10px; color:var(--muted); margin-bottom:4px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; }
.dtip-val { font-size:18px; font-weight:800; margin-bottom:2px; }
.dtip-pct { font-size:11px; color:var(--muted); }

.donut-wrap { display:flex; align-items:center; gap:20px; }
.donut-legend { flex:1; display:flex; flex-direction:column; gap:8px; }
.legend-row { display:flex; align-items:center; gap:10px; padding:8px 10px; border-radius:12px; background:var(--card2); border:1px solid var(--border); cursor:pointer; }
.legend-color { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.legend-name { font-size:12px; color:var(--muted); flex:1; font-weight:500; }
.legend-val { font-size:13px; font-weight:700; }

/* Salary */
.salary-hero { margin:8px 20px 0; background:var(--card2); border-radius:24px; padding:28px 24px; border:1px solid var(--border); text-align:center; }
.sal-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:8px; }
.sal-amount { font-size:48px; font-weight:800; letter-spacing:-0.04em; color:var(--green); margin-bottom:4px; line-height:1; }
.sal-amount span { font-size:28px; }
.sal-sub { font-size:12px; color:var(--muted); margin-bottom:20px; }
.progress-bar-wrap { background:var(--card3); border-radius:8px; height:8px; overflow:hidden; margin-bottom:8px; }
.progress-bar-fill { height:100%; border-radius:8px; background:linear-gradient(90deg,var(--green),var(--pink)); }
.progress-labels { display:flex; justify-content:space-between; font-size:11px; color:var(--muted); font-weight:500; }

.tx-list { display:flex; flex-direction:column; gap:6px; }
.tx-row { display:flex; align-items:center; gap:12px; padding:14px; background:var(--card); border-radius:16px; border:1px solid var(--border); }
.tx-icon-wrap { width:44px; height:44px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
.tx-info { flex:1; min-width:0; }
.tx-name { font-size:14px; font-weight:600; margin-bottom:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.tx-meta { font-size:11px; color:var(--muted); }
.tx-amt { font-size:15px; font-weight:700; white-space:nowrap; letter-spacing:-0.01em; }

/* Detail */
.sticky-top { position:sticky; top:88px; z-index:9; background:var(--bg); padding-bottom:8px; }
.search-wrap { padding:0 20px 10px; }
.search-box { display:flex; align-items:center; gap:10px; background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:11px 14px; }
.search-box input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; font-weight:500; }
.search-box input::placeholder { color:var(--muted2); }
.search-ico { font-size:15px; color:var(--muted); }
.chips-row { display:flex; gap:8px; padding:0 20px; overflow-x:auto; scrollbar-width:none; }
.chips-row::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:6px 14px; border-radius:20px; font-size:12px; font-weight:600; border:1px solid var(--border); color:var(--muted); cursor:pointer; background:var(--card2); font-family:'Inter',sans-serif; transition:all 0.18s; }
.chip.active { background:var(--green); border-color:var(--green); color:#111; }
.date-section { padding:12px 20px 0; }
.date-card { background:var(--card2); border:1px solid var(--border); border-radius:16px; padding:14px 16px; }
.date-label { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:10px; }
.date-row { display:flex; align-items:center; gap:8px; }
.date-in { flex:1; background:var(--card3); border:1px solid var(--border); border-radius:10px; padding:8px 10px; color:var(--text); font-size:12px; font-family:'Inter',monospace; font-weight:500; outline:none; width:100%; }
.date-sep { color:var(--muted2); font-size:13px; flex-shrink:0; }
.date-clear { font-size:11px; color:var(--green); margin-top:10px; cursor:pointer; display:inline-block; font-weight:600; }
.results-row { display:flex; justify-content:space-between; align-items:center; padding:14px 20px 8px; }
.results-count { font-size:12px; color:var(--muted); font-weight:500; }
.results-sum { font-size:14px; font-weight:700; }
.empty { text-align:center; padding:56px 24px; }
.empty-ico { font-size:40px; margin-bottom:12px; }
.empty-txt { font-size:14px; color:var(--muted); font-weight:500; }
.highlight { background:rgba(168,230,207,0.2); border-radius:3px; padding:0 1px; }

.bottom-nav { position:absolute; bottom:0; left:0; right:0; height:84px; background:rgba(17,17,17,0.96); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-top:1px solid var(--border); display:flex; align-items:center; padding:0 8px 16px; z-index:100; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:8px 0; border:none; background:transparent; cursor:pointer; color:var(--muted2); font-family:'Inter',sans-serif; transition:color 0.18s; }
.nav-btn.active { color:var(--text); }
.nav-ico { font-size:22px; }
.nav-lbl { font-size:10px; font-weight:600; letter-spacing:0.02em; }
.fade-in { animation:fu 0.35s ease both; }
@keyframes fu { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="app">

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">載入資料中…</div>
  </div>

  <!-- Tooltips -->
  <div class="tip" id="lineTip">
    <div class="tip-month" id="ttM"></div>
    <div class="tip-row"><span class="tip-dot" style="background:var(--green)"></span><span class="tip-lbl">收入</span><span class="tip-val" id="ttI" style="color:var(--green)"></span></div>
    <div class="tip-row"><span class="tip-dot" style="background:var(--pink)"></span><span class="tip-lbl">支出</span><span class="tip-val" id="ttE" style="color:var(--pink)"></span></div>
    <div class="tip-row"><span class="tip-dot" style="background:var(--yellow)"></span><span class="tip-lbl">投資</span><span class="tip-val" id="ttV" style="color:var(--yellow)"></span></div>
  </div>
  <div class="tip" id="dTip">
    <div class="dtip-name" id="dtN"></div>
    <div class="dtip-val" id="dtV"></div>
    <div class="dtip-pct" id="dtP"></div>
  </div>

  <!-- ══ 總覽 ══ -->
  <div class="page active" id="page-home">
    <div class="header">
      <div class="header-row">
        <div>
          <div class="greeting" id="homeGreeting">載入中…</div>
          <div class="page-title">財務總覽</div>
        </div>
        <div class="avatar-btn" id="refreshBtn" onclick="loadData()" title="重新整理">🔄</div>
      </div>
    </div>
    <div class="error-banner" id="errorBanner">⚠️ 無法載入資料，請確認網路連線後點右上角重新整理</div>

    <div class="hero-wrap">
      <div class="hero-card fade-in">
        <div class="hero-tag"><span class="hero-tag-dot"></span>本月結餘</div>
        <div class="hero-amount" id="heroBalance"><span>$</span>—</div>
        <div class="hero-stats">
          <div class="hero-stat"><div class="hs-label">收入</div><div class="hs-val income" id="heroIncome">—</div></div>
          <div class="hero-stat"><div class="hs-label">支出</div><div class="hs-val expense" id="heroExpense">—</div></div>
          <div class="hero-stat"><div class="hs-label">投資</div><div class="hs-val invest" id="heroInvest">—</div></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-row"><div class="section-title">收入 vs 支出趨勢</div></div>
    </div>
    <div style="padding:8px 20px 0;">
      <div class="chart-card-inner">
        <div class="lc-legend">
          <div class="lc-item"><div class="lc-dot" style="background:var(--green)"></div>收入</div>
          <div class="lc-item"><div class="lc-dot" style="background:var(--pink)"></div>支出</div>
          <div class="lc-item"><div class="lc-dot" style="background:var(--yellow);opacity:0.8"></div>投資</div>
        </div>
        <div style="padding-left:30px;overflow:visible;">
          <svg id="lineChartSvg" viewBox="0 0 300 115" width="100%" style="overflow:visible;display:block;">
            <defs>
              <linearGradient id="gGreen" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#a8e6cf" stop-opacity="0.2"/>
                <stop offset="100%" stop-color="#a8e6cf" stop-opacity="0"/>
              </linearGradient>
              <linearGradient id="gPink" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f4b8c1" stop-opacity="0.15"/>
                <stop offset="100%" stop-color="#f4b8c1" stop-opacity="0"/>
              </linearGradient>
            </defs>
            <line x1="0" y1="0"   x2="300" y2="0"   stroke="#2e2e2e" stroke-width="1"/>
            <line x1="0" y1="38"  x2="300" y2="38"  stroke="#2e2e2e" stroke-width="1"/>
            <line x1="0" y1="76"  x2="300" y2="76"  stroke="#2e2e2e" stroke-width="1"/>
            <line x1="0" y1="114" x2="300" y2="114" stroke="#2e2e2e" stroke-width="1"/>
            <text id="yL1" x="-4" y="4"   fill="#555" font-size="9" text-anchor="end" font-family="Inter"></text>
            <text id="yL2" x="-4" y="42"  fill="#555" font-size="9" text-anchor="end" font-family="Inter"></text>
            <text id="yL3" x="-4" y="80"  fill="#555" font-size="9" text-anchor="end" font-family="Inter"></text>
            <text id="yL4" x="-4" y="118" fill="#555" font-size="9" text-anchor="end" font-family="Inter"></text>
            <g id="lineChartContent"></g>
          </svg>
        </div>
        <div class="x-labels" id="xLabels"></div>
      </div>
    </div>

    <div class="section" style="padding-bottom:8px;">
      <div class="section-row"><div class="section-title">本月支出分類</div></div>
      <div class="donut-card">
        <div class="donut-wrap">
          <div style="flex-shrink:0;width:120px;height:120px;">
            <svg id="donutSvg" width="120" height="120" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="44" fill="none" stroke="#242424" stroke-width="18"/>
              <g id="donutArcs"></g>
              <text x="60" y="56" text-anchor="middle" fill="#888" font-size="10" font-family="Inter" font-weight="600">總計</text>
              <text id="donutTotal" x="60" y="70" text-anchor="middle" fill="#f5f5f5" font-size="11" font-family="Inter" font-weight="800">—</text>
            </svg>
          </div>
          <div class="donut-legend" id="donutLegend"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ 明細 ══ -->
  <div class="page" id="page-detail">
    <div class="header">
      <div class="header-row">
        <div><div class="greeting">搜尋與篩選</div><div class="page-title">所有明細</div></div>
        <div class="avatar-btn">🔍</div>
      </div>
    </div>
    <div class="sticky-top">
      <div class="search-wrap">
        <div class="search-box">
          <span class="search-ico">🔍</span>
          <input type="text" id="searchInput" placeholder="搜尋項目名稱、類別…" oninput="applyFilters()">
        </div>
      </div>
      <div class="chips-row" id="catChips">
        <button class="chip active" data-cat="全部" onclick="selCat(this)">全部</button>
        <button class="chip" data-cat="餐飲" onclick="selCat(this)">🍜 餐飲</button>
        <button class="chip" data-cat="交通" onclick="selCat(this)">🚇 交通</button>
        <button class="chip" data-cat="娛樂" onclick="selCat(this)">🎬 娛樂</button>
        <button class="chip" data-cat="訂閱" onclick="selCat(this)">📱 訂閱</button>
        <button class="chip" data-cat="投資" onclick="selCat(this)">📈 投資</button>
        <button class="chip" data-cat="薪資" onclick="selCat(this)">💰 薪資</button>
        <button class="chip" data-cat="其他" onclick="selCat(this)">📦 其他</button>
      </div>
    </div>
    <div class="date-section">
      <div class="date-card">
        <div class="date-label">篩選時間區間</div>
        <div class="date-row">
          <input type="date" class="date-in" id="dateFrom" onchange="applyFilters()">
          <span class="date-sep">—</span>
          <input type="date" class="date-in" id="dateTo" onchange="applyFilters()">
        </div>
        <span class="date-clear" onclick="clearDates()">✕ 清除日期篩選</span>
      </div>
    </div>
    <div class="results-row">
      <div class="results-count" id="rCount">共 0 筆</div>
      <div class="results-sum" id="rSum"></div>
    </div>
    <div style="padding:0 20px;">
      <div class="tx-list" id="detailList"></div>
      <div class="empty" id="emptyState" style="display:none">
        <div class="empty-ico">🔎</div>
        <div class="empty-txt">找不到符合條件的記錄</div>
      </div>
    </div>
  </div>

  <!-- ══ 薪資 ══ -->
  <div class="page" id="page-salary">
    <div class="header">
      <div class="header-row">
        <div><div class="greeting">薪資記錄</div><div class="page-title">收入管理</div></div>
        <div class="avatar-btn">💼</div>
      </div>
    </div>
    <div class="salary-hero">
      <div class="sal-label">本月薪資</div>
      <div class="sal-amount" id="salAmount"><span>$</span>—</div>
      <div class="sal-sub" id="salSub">載入中</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="salProgress" style="width:0%"></div></div>
      <div class="progress-labels">
        <span id="salSpent">已花費 —</span>
        <span style="color:var(--green)" id="salLeft">剩餘 —</span>
      </div>
    </div>
    <div class="section">
      <div class="section-row"><div class="section-title">薪資歷史</div></div>
      <div class="tx-list" id="salaryList"></div>
    </div>
  </div>

  <!-- Nav -->
  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="switchPage('home',this)">
      <span class="nav-ico">🏠</span><span class="nav-lbl">總覽</span>
    </button>
    <button class="nav-btn" onclick="switchPage('detail',this)">
      <span class="nav-ico">📋</span><span class="nav-lbl">明細</span>
    </button>
    <button class="nav-btn" onclick="switchPage('salary',this)">
      <span class="nav-ico">💼</span><span class="nav-lbl">薪資</span>
    </button>
  </nav>
</div>

<script>
// ════════════════════════════════
// ★ 設定你的 Google Sheet ID ★
const SHEET_ID = '1lJnW9WbfE8hGbhPBtA4saF9dTxDMrerJrp22i_i7vN0';
// ════════════════════════════════

const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=記錄`;

let allTx = [];
let lineData = [];

// ── Fetch & parse Google Sheet ──
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  document.getElementById('errorBanner').classList.remove('show');

  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
    const rows = json.table.rows;

    allTx = rows.map(r => {
      const rawDate = r.c[0]?.v || '';
      const amount  = parseFloat(r.c[1]?.v) || 0;
      const cat     = r.c[2]?.v || '';
      const name    = r.c[3]?.v || '';
      const type    = r.c[4]?.v || '';
      const note    = r.c[5]?.v || '';

      // Parse date — Google returns "Date(2026,3,1)" for April 1
      let dateStr = '';
      if (typeof rawDate === 'string' && rawDate.startsWith('Date(')) {
        const parts = rawDate.replace('Date(','').replace(')','').split(',');
        const y = parts[0], m = String(parseInt(parts[1])+1).padStart(2,'0'), d = String(parts[2]).padStart(2,'0');
        dateStr = `${y}/${m}/${d}`;
      } else {
        dateStr = String(rawDate).replace(/-/g,'/');
      }

      const txType = type === '收入' ? 'income' : type === '投資' ? 'invest' : 'expense';
      const icon = catIcon(cat, txType);

      return { date: dateStr, amount, cat, name, type, note, txType, icon };
    }).filter(tx => tx.date && tx.name);

    // Sort descending
    allTx.sort((a,b) => b.date.localeCompare(a.date));

    renderAll();
    document.getElementById('loadingOverlay').classList.add('hidden');
  } catch(e) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('errorBanner').classList.add('show');
    console.error(e);
  }

  btn.classList.remove('spinning');
}

function catIcon(cat, type) {
  const map = { '餐飲':'🍜','交通':'🚇','娛樂':'🎬','訂閱':'📱','投資':'📈','薪資':'💰','其他':'📦' };
  if (type === 'income') return '💰';
  if (type === 'invest') return '📈';
  return map[cat] || '💳';
}

// ── Render all sections ──
function renderAll() {
  const now = new Date();
  const curYear  = now.getFullYear();
  const curMonth = now.getMonth() + 1;
  const curYM    = `${curYear}/${String(curMonth).padStart(2,'0')}`;

  // Update greeting
  document.getElementById('homeGreeting').textContent = `${curMonth}月・${curYear}`;

  // This month's transactions
  const thisMonth = allTx.filter(tx => tx.date.startsWith(curYM));
  const income  = thisMonth.filter(t=>t.txType==='income').reduce((s,t)=>s+t.amount,0);
  const expense = thisMonth.filter(t=>t.txType==='expense').reduce((s,t)=>s+Math.abs(t.amount),0);
  const invest  = thisMonth.filter(t=>t.txType==='invest').reduce((s,t)=>s+Math.abs(t.amount),0);
  const balance = income - expense - invest;

  // Hero
  const balSign = balance >= 0 ? '+$' : '-$';
  document.getElementById('heroBalance').innerHTML = `<span>${balSign}</span>${Math.abs(balance).toLocaleString()}`;
  document.getElementById('heroIncome').textContent  = '+$' + income.toLocaleString();
  document.getElementById('heroExpense').textContent = '-$' + expense.toLocaleString();
  document.getElementById('heroInvest').textContent  = '-$' + invest.toLocaleString();

  renderLineChart(curYear, curMonth);
  renderDonut(thisMonth);
  renderSalary(curYM, income, expense);
  applyFilters();
}

// ── Line Chart ──
function renderLineChart(curYear, curMonth) {
  lineData = [];
  const count = Math.min(curMonth, 6);
  for (let i = count - 1; i >= 0; i--) {
    let m = curMonth - i;
    let y = curYear;
    if (m <= 0) { m += 12; y--; }
    const ym = `${y}/${String(m).padStart(2,'0')}`;
    const monthTx = allTx.filter(tx => tx.date.startsWith(ym));
    lineData.push({
      month: m + '月',
      income:  monthTx.filter(t=>t.txType==='income').reduce((s,t)=>s+t.amount,0),
      expense: monthTx.filter(t=>t.txType==='expense').reduce((s,t)=>s+Math.abs(t.amount),0),
      invest:  monthTx.filter(t=>t.txType==='invest').reduce((s,t)=>s+Math.abs(t.amount),0),
    });
  }

  const allVals = lineData.flatMap(d=>[d.income, d.expense, d.invest]).filter(v=>v>0);
  const maxVal = allVals.length ? Math.max(...allVals) : 100000;
  const roundedMax = Math.ceil(maxVal / 10000) * 10000;
  const H = 114, W = 300;
  const n = lineData.length;
  const xs = lineData.map((_,i) => n===1 ? W/2 : Math.round(i * W / (n-1)));

  function yp(v) { return H - Math.round((v / roundedMax) * H); }
  function fmt(v) { return v >= 1000 ? Math.round(v/1000)+'K' : v; }

  // Y labels
  document.getElementById('yL1').textContent = fmt(roundedMax);
  document.getElementById('yL2').textContent = fmt(roundedMax * 0.67);
  document.getElementById('yL3').textContent = fmt(roundedMax * 0.33);
  document.getElementById('yL4').textContent = '0';

  // X labels
  document.getElementById('xLabels').innerHTML = lineData.map(d=>`<span class="x-lbl">${d.month}</span>`).join('');

  const ipts = lineData.map((d,i)=>`${xs[i]},${yp(d.income)}`).join(' ');
  const epts = lineData.map((d,i)=>`${xs[i]},${yp(d.expense)}`).join(' ');
  const vpts = lineData.map((d,i)=>`${xs[i]},${yp(d.invest)}`).join(' ');

  const iArea = `M${xs[0]},${yp(lineData[0].income)} ` + lineData.slice(1).map((_,i)=>`L${xs[i+1]},${yp(lineData[i+1].income)}`).join(' ') + ` L${xs[n-1]},${H} L${xs[0]},${H} Z`;
  const eArea = `M${xs[0]},${yp(lineData[0].expense)} ` + lineData.slice(1).map((_,i)=>`L${xs[i+1]},${yp(lineData[i+1].expense)}`).join(' ') + ` L${xs[n-1]},${H} L${xs[0]},${H} Z`;

  const dots = lineData.map((d,i) => `
    <circle cx="${xs[i]}" cy="${yp(d.income)}" r="8" fill="transparent" style="cursor:pointer"
      onmouseenter="showLTip(event,${i})" ontouchstart="showLTip(event,${i})"
      onmouseleave="hTip('lineTip')" ontouchend="hTip('lineTip')"/>
    <circle cx="${xs[i]}" cy="${yp(d.income)}" r="4.5" fill="#111" stroke="#a8e6cf" stroke-width="2" pointer-events="none"/>
  `).join('');

  const lastI = yp(lineData[n-1].income);
  const lastE = yp(lineData[n-1].expense);
  const lastV = yp(lineData[n-1].invest);

  document.getElementById('lineChartContent').innerHTML = `
    <path d="${iArea}" fill="url(#gGreen)"/>
    <polyline points="${ipts}" fill="none" stroke="#a8e6cf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${eArea}" fill="url(#gPink)"/>
    <polyline points="${epts}" fill="none" stroke="#f4b8c1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="${vpts}" fill="none" stroke="#f5e6a3" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="5,3"/>
    ${dots}
    <circle cx="${xs[n-1]}" cy="${lastI}" r="5" fill="#a8e6cf" pointer-events="none"/>
    <text x="${xs[n-1]+8}" y="${lastI+4}" fill="#a8e6cf" font-size="9" font-family="Inter" font-weight="600">${fmt(lineData[n-1].income)}</text>
    <text x="${xs[n-1]+8}" y="${lastE+4}" fill="#f4b8c1" font-size="9" font-family="Inter" font-weight="600">${fmt(lineData[n-1].expense)}</text>
    <text x="${xs[n-1]+8}" y="${lastV+4}" fill="#f5e6a3" font-size="9" font-family="Inter" font-weight="600">${fmt(lineData[n-1].invest)}</text>
  `;
}

// ── Donut Chart ──
function renderDonut(thisMonth) {
  const expTx = thisMonth.filter(t=>t.txType==='expense');
  const cats = {};
  expTx.forEach(tx => { cats[tx.cat] = (cats[tx.cat]||0) + Math.abs(tx.amount); });
  const sorted = Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const total  = sorted.reduce((s,[,v])=>s+v, 0);

  const colors = ['#a8e6cf','#f5e6a3','#f4b8c1','#b8d4f4','#d4a8e6','#e6cfa8'];
  const C = 2 * Math.PI * 44;
  let offset = C * 0.25; // start from top

  let arcs = '', legend = '';
  sorted.slice(0,5).forEach(([cat, val], i) => {
    const pct = total > 0 ? val/total : 0;
    const dash = pct * C;
    const gap  = C - dash;
    const color = colors[i % colors.length];
    const pctStr = Math.round(pct*100)+'%';

    arcs += `<circle cx="60" cy="60" r="44" fill="none" stroke="${color}" stroke-width="18"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
      stroke-dashoffset="-${(offset - C*0.25).toFixed(1)}"
      stroke-linecap="round" style="cursor:pointer"
      data-name="${cat}" data-val="$${val.toLocaleString()}" data-pct="${pctStr}" data-color="${color}"
      onmouseenter="showDTip(event,this)" ontouchstart="showDTip(event,this)"
      onmouseleave="hTip('dTip')" ontouchend="hTip('dTip')"/>`;

    offset += dash;

    legend += `<div class="legend-row"
      onmouseenter="showDLeg(event,'${cat}','$${val.toLocaleString()}','${pctStr}','${color}')"
      onmouseleave="hTip('dTip')"
      ontouchstart="showDLeg(event,'${cat}','$${val.toLocaleString()}','${pctStr}','${color}')"
      ontouchend="hTip('dTip')">
      <div class="legend-color" style="background:${color}"></div>
      <div class="legend-name">${cat}</div>
      <div class="legend-val" style="color:${color}">$${val.toLocaleString()}</div>
    </div>`;
  });

  document.getElementById('donutArcs').innerHTML = arcs;
  document.getElementById('donutLegend').innerHTML = legend || '<div style="color:var(--muted);font-size:13px;padding:8px;">本月無支出記錄</div>';
  document.getElementById('donutTotal').textContent = total > 0 ? total.toLocaleString() : '—';
}

// ── Salary Page ──
function renderSalary(curYM, income, expense) {
  document.getElementById('salAmount').innerHTML = `<span>$</span>${income.toLocaleString()}`;
  document.getElementById('salSub').textContent = curYM.replace('/','/') + ' 入帳';
  const pct = income > 0 ? Math.min(100, Math.round(expense/income*100)) : 0;
  document.getElementById('salProgress').style.width = pct + '%';
  document.getElementById('salSpent').textContent = '已花費 $' + expense.toLocaleString();
  const left = income - expense;
  document.getElementById('salLeft').textContent = '剩餘 $' + Math.max(0, left).toLocaleString();

  const salTx = allTx.filter(tx=>tx.txType==='income');
  const bg = 'rgba(168,230,207,0.1)';
  document.getElementById('salaryList').innerHTML = salTx.slice(0,10).map(tx=>`
    <div class="tx-row">
      <div class="tx-icon-wrap" style="background:${bg}">${tx.icon}</div>
      <div class="tx-info">
        <div class="tx-name">${tx.name}</div>
        <div class="tx-meta">${tx.date}・${tx.cat}</div>
      </div>
      <div class="tx-amt" style="color:var(--green)">+$${tx.amount.toLocaleString()}</div>
    </div>`).join('') || '<div class="empty"><div class="empty-ico">💰</div><div class="empty-txt">尚無收入記錄</div></div>';
}

// ── Navigation ──
function switchPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
  document.getElementById('page-'+id).scrollTop = 0;
  if (id==='detail') applyFilters();
}

// ── Tooltips ──
function pos(tip, e) {
  const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  const tw=tip.offsetWidth||140, th=tip.offsetHeight||90;
  const vw=window.innerWidth, vh=window.innerHeight;
  let x=cx+14, y=cy-th/2;
  if(x+tw>vw-8)x=cx-tw-14;
  if(y<8)y=8; if(y+th>vh-8)y=vh-th-8;
  tip.style.left=x+'px'; tip.style.top=y+'px';
}
function hTip(id){document.getElementById(id).classList.remove('vis');}
function showLTip(e,i){
  e.stopPropagation();
  const d=lineData[i],t=document.getElementById('lineTip');
  document.getElementById('ttM').textContent=d.month;
  document.getElementById('ttI').textContent='$'+d.income.toLocaleString();
  document.getElementById('ttE').textContent='$'+d.expense.toLocaleString();
  document.getElementById('ttV').textContent='$'+d.invest.toLocaleString();
  t.classList.add('vis'); pos(t,e);
}
function showDTip(e,el){
  e.stopPropagation();
  const t=document.getElementById('dTip');
  document.getElementById('dtN').textContent=el.dataset.name;
  document.getElementById('dtV').style.color=el.dataset.color;
  document.getElementById('dtV').textContent=el.dataset.val;
  document.getElementById('dtP').textContent='佔比 '+el.dataset.pct;
  t.classList.add('vis'); pos(t,e);
}
function showDLeg(e,name,val,pct,color){
  e.stopPropagation();
  const t=document.getElementById('dTip');
  document.getElementById('dtN').textContent=name;
  document.getElementById('dtV').style.color=color;
  document.getElementById('dtV').textContent=val;
  document.getElementById('dtP').textContent='佔比 '+pct;
  t.classList.add('vis'); pos(t,e);
}
document.addEventListener('click',()=>{hTip('lineTip');hTip('dTip');});

// ── Detail Filters ──
let curCat='全部';
function selCat(el){
  document.querySelectorAll('#catChips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active'); curCat=el.dataset.cat; applyFilters();
}
function clearDates(){
  document.getElementById('dateFrom').value='';
  document.getElementById('dateTo').value='';
  applyFilters();
}
function hl(t,q){
  if(!q)return t;
  return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<span class="highlight">$1</span>');
}
function applyFilters(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const from=document.getElementById('dateFrom').value.replace(/-/g,'/');
  const to=document.getElementById('dateTo').value.replace(/-/g,'/');
  const f=allTx.filter(tx=>{
    return(curCat==='全部'||tx.cat===curCat)&&
      (!q||tx.name.toLowerCase().includes(q)||tx.cat.toLowerCase().includes(q))&&
      (!from||tx.date>=from)&&(!to||tx.date<=to);
  });
  document.getElementById('rCount').textContent=`共 ${f.length} 筆`;
  const total=f.reduce((s,t)=>s+t.amount,0);
  const se=document.getElementById('rSum');
  if(f.length){
    const c=total>=0?'var(--green)':'var(--pink)';
    se.innerHTML=`<span style="color:${c}">${total>=0?'+':''}$${Math.abs(total).toLocaleString()}</span>`;
  } else se.textContent='';
  const list=document.getElementById('detailList');
  const empty=document.getElementById('emptyState');
  if(!f.length){list.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  const bg={income:'rgba(168,230,207,0.1)',expense:'rgba(244,184,193,0.1)',invest:'rgba(245,230,163,0.1)'};
  const cl={income:'var(--green)',expense:'var(--pink)',invest:'var(--yellow)'};
  list.innerHTML=f.map(tx=>{
    const sign=tx.amount>0?'+':'';
    return `<div class="tx-row">
      <div class="tx-icon-wrap" style="background:${bg[tx.txType]}">${tx.icon}</div>
      <div class="tx-info">
        <div class="tx-name">${hl(tx.name,q)}</div>
        <div class="tx-meta">${tx.date}・${hl(tx.cat,q)}</div>
      </div>
      <div class="tx-amt" style="color:${cl[tx.txType]}">${sign}$${Math.abs(tx.amount).toLocaleString()}</div>
    </div>`;
  }).join('');
}

loadData();
